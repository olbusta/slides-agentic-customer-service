meta:
  title: "Agentic Customer Service"
  subtitle: "From Resolution to Relationship"
  audience: "DXD"
  theme:
    style: "black"
    note: ""

slides:

  - id: 1
    type: title
    layout: dark
    video: "assets/video/12336965-hd_1920_1028_60fps.mp4"
    eyebrow: "AGENTIC CUSTOMER SERVICE"
    title: "From Resolution to Relationship"
    body: |-
      Customer service is where the relationship lives, not just the transaction.      
      That's the difference between damage control and trust-building.

  - id: 2
    type: content
    layout: light
    section: "THE SHIFT"
    title: "Today's service model is built around problems"
    subtitle: "Agentic AI changes the premise entirely."
    cards:
      - icon: phone
        title: "Reactive by Design"
        body: "Customers reach out when something breaks. They wait, explain, get transferred, explain again. The burden is on them."
      - icon: user-slash
        title: "No Relationship Memory"
        body: "Every contact is a cold start. No context, no history, no continuity. A case number, not a person."
      - icon: warning
        title: "Resolution Without Trust"
        body: "Even when issues get resolved, the experience leaves customers feeling managed — not looked after."

  - id: 3
    type: content
    layout: light
    section: "THE NORTH STAR"
    title: "Every Customer Should Feel Looked After"
    subtitle: "Not just resolved. Looked after. Before they even know they need it."
    points:
      - icon: user-check
        title: "No Cold Starts"
        body: "Every interaction continues a relationship, not a new case number. The agent already knows who you are and what matters to you."
      - icon: shield
        title: "No Surprises"
        body: "Customers are informed before frustration builds. Delays, issues, and exceptions are caught and communicated proactively."
      - icon: heart
        title: "Always Human When It Matters"
        body: "Escalation is graceful, warm, and well-timed. The agent knows when to step back and let a person take over."

  - id: 4
    type: content
    layout: light
    section: "WHAT AGENTIC MEANS"
    title: "An agentic system doesn't just respond"
    subtitle: "It senses, decides, acts, and learns."
    points:
      - icon: eye
        title: "Sense"
        body: "Reads signals across order data, delivery status, product history, and customer context — continuously, not just when asked."
      - icon: crosshair
        title: "Decide"
        body: "Determines the right action without waiting to be prompted. It knows what it can handle and what needs a human."
      - icon: bolt
        title: "Act"
        body: "Resolves, escalates, compensates, or follows up — end to end. No handoff gaps, no dead ends."
      - icon: loop
        title: "Learn"
        body: "Improves its judgment with every interaction. The system gets better the more it serves."

  - id: 5
    type: content
    layout: light
    section: "THREE MODES"
    title: "Most journeys move fluidly across these three modes."
    subtitle: "Not all agentic service looks the same."
    steps:
      - number: "01"
        icon: user-check
        title: "Assistive"
        body: "The agent supports a human agent or customer with information, suggestions, and next steps. Human remains in control."
      - number: "02"
        icon: trending-up
        title: "Proactive"
        body: "The agent detects a signal and reaches out — a delivery exception, a recall, an assembly issue. Action happens before the customer asks."
      - number: "03"
        icon: rocket
        title: "Autonomous"
        body: "The agent resolves end to end. Books, compensates, reorders, follows up. No human needed unless the customer wants one."

  - id: 6
    type: title
    layout: dark
    eyebrow: "OPEN DISCUSSION"
    title: "What Are Your Thoughts?"
    body: "How do you see this from your perspective? What would you add, challenge, or do differently?"

